<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スイスドロー大会管理</title>
  <meta name="description" content="カードゲーム向けスイスドロー形式の大会管理ツール。無料・登録不要でブラウザから使えます。">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="admin-app" class="app">
  <header>
    <div class="logo">SWISS<span>DRAW</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="conn-status" class="conn-status conn-err">接続中...</span>
      <span id="tournament-name-display" style="font-size:12px;color:var(--text2);"></span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('setup')">設定</button>
    <button class="tab" onclick="switchTab('round')">対戦</button>
    <button class="tab" onclick="switchTab('standing')">順位</button>
    <button class="tab" onclick="switchTab('timer')">タイマー</button>
  </div>

  <div id="tab-setup" class="panel active">
    <div class="card">
      <div class="card-title">大会設定</div>
      <div class="row">
        <input type="text" id="inp-tournament-name" placeholder="大会名（例：第1回〇〇杯）" style="flex:2;">
        <select id="inp-rounds" onchange="renderPlayers()">
          <option value="auto">ラウンド数：自動</option>
          <option value="3">3ラウンド</option>
          <option value="4">4ラウンド</option>
          <option value="5">5ラウンド</option>
          <option value="6">6ラウンド</option>
          <option value="7">7ラウンド</option>
          <option value="8">8ラウンド</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title">参加者登録</div>
      <div class="row">
        <input type="text" id="inp-player" placeholder="プレイヤー名を入力" onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="btn btn-primary" onclick="addPlayer()">追加</button>
        <button class="btn btn-ghost" onclick="bulkAdd()">一括入力</button>
      </div>
      <div id="player-list" class="player-list"></div>
      <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <span id="player-count-info" style="font-size:13px;color:var(--text2);">0人登録済み</span>
        <span id="rounds-preview" style="font-size:13px;color:var(--green);"></span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-success" onclick="startTournament()" style="flex:1;">大会を開始する</button>
      <button class="btn btn-ghost" onclick="resetAll()">リセット</button>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="card-title">既存の大会を読み込む</div>
      <div class="row">
        <input type="text" id="inp-load-id" placeholder="大会IDを入力">
        <button class="btn btn-ghost" onclick="loadTournament()">読み込む</button>
      </div>
      <div id="load-status" style="font-size:12px;color:var(--text2);margin-top:6px;"></div>
    </div>
  </div>

  <div id="tab-round" class="panel">
    <div id="round-content"><div class="empty">大会を開始してください</div></div>
  </div>

  <div id="tab-standing" class="panel">
    <div class="card">
      <div class="card-title">順位表</div>
      <div id="standing-content"><div class="empty">大会を開始してください</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-ghost" onclick="exportCSV()">CSVエクスポート</button>
    </div>
  </div>

  <div id="tab-timer" class="panel">
    <div class="card" style="text-align:center;">
      <div class="card-title">ラウンドタイマー</div>
      <div class="row" style="justify-content:center;margin-bottom:12px;">
        <select id="timer-preset" onchange="timerReset()">
          <option value="50">50分</option>
          <option value="40">40分</option>
          <option value="30">30分</option>
          <option value="25">25分</option>
          <option value="20">20分</option>
        </select>
        <input type="number" id="timer-custom" placeholder="カスタム(分)" min="1" max="180" style="width:130px;" onchange="timerReset()">
      </div>
      <div class="timer-display" id="timer-display">50:00</div>
      <div class="timer-controls">
        <button class="btn btn-primary" onclick="timerStart()">スタート</button>
        <button class="btn btn-ghost" onclick="timerPause()">一時停止</button>
        <button class="btn btn-ghost" onclick="timerReset()">リセット</button>
      </div>
    </div>
  </div>
</div>

<div id="player-app" class="app player-app hidden">
  <header>
    <div class="logo">SWISS<span>DRAW</span></div>
    <span id="player-conn-status" class="conn-status conn-err">接続中...</span>
  </header>

  <div class="card">
    <div class="card-title">結果登録</div>
    <div id="player-page-content" class="loading">読み込み中...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xizsnqlhbswnhvgkwsqt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_K8PqzA8680tC5GECdpDC5w_RbQueZDd';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
const params = new URLSearchParams(location.search);
const isPlayerPage = params.has('tid') && params.has('round');

async function checkConnection(targetId='conn-status'){
  try {
    const { error } = await db.from('tournaments').select('id').limit(1);
    const el = document.getElementById(targetId);
    if(!el) return;
    if(error){ el.textContent='接続エラー'; el.className='conn-status conn-err'; }
    else{ el.textContent='接続OK'; el.className='conn-status conn-ok'; }
  } catch(e) {
    const el = document.getElementById(targetId);
    if(el) el.textContent='接続エラー';
  }
}

let state = {
  tournamentId: null, name: '', players: [], rounds: [],
  currentRound: 0, totalRounds: 0, started: false
};

let playerPage = {
  tournament: null,
  players: [],
  matches: [],
  selectedPlayerId: ''
};
let playerRoundPoll = null;

function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function applyResultAutoGame(result, gw1, gw2){
  if(result === 'p1' && gw1 === 0) gw1 = 1;
  if(result === 'p2' && gw2 === 0) gw2 = 1;
  return { gw1, gw2 };
}

function getPlayerStorageKey(){
  const tid = playerPage.tournament?.id || params.get('tid') || '';
  return `swissdraw:selectedPlayer:${tid}`;
}

function getStoredPlayerId(){
  return params.get('player') || localStorage.getItem(getPlayerStorageKey()) || '';
}

function storeSelectedPlayer(playerId){
  if(!playerId) return;
  localStorage.setItem(getPlayerStorageKey(), playerId);
}

function getPlayerRoundUrl(roundNum, playerId=playerPage.selectedPlayerId){
  const url = new URL(location.href);
  url.searchParams.set('tid', playerPage.tournament.id);
  url.searchParams.set('round', String(roundNum));
  if(playerId) url.searchParams.set('player', playerId);
  return url.toString();
}

function switchTab(t){
  ['setup','round','standing','timer'].forEach((name,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active', name===t);
    document.getElementById('tab-'+name).classList.toggle('active', name===t);
  });
  if(t==='round') renderRound();
  if(t==='standing') renderStanding();
}

function calcRounds(n){
  if(n<=2)return 1; if(n<=4)return 2; if(n<=8)return 3;
  if(n<=16)return 4; if(n<=32)return 5; if(n<=64)return 6;
  if(n<=128)return 7; return 8;
}

function addPlayer(){
  const inp = document.getElementById('inp-player');
  const name = inp.value.trim();
  if(!name) return;
  if(state.started){ alert('大会開始後は参加者を追加できません'); return; }
  if(state.players.find(p=>p.name===name)){ alert('同じ名前のプレイヤーが既にいます'); return; }
  state.players.push({
    id: 'local_' + Date.now() + Math.random(), name, dropped: false,
    wins:0, losses:0, draws:0, gameWins:0, gameLosses:0, opponents:[]
  });
  inp.value = '';
  renderPlayers();
}

function bulkAdd(){
  const names = prompt('プレイヤー名を改行区切りで入力してください');
  if(!names) return;
  names.split('\n').forEach(n=>{
    const name = n.trim();
    if(!name || state.players.find(p=>p.name===name)) return;
    state.players.push({
      id: 'local_'+Date.now()+Math.random(), name, dropped: false,
      wins:0, losses:0, draws:0, gameWins:0, gameLosses:0, opponents:[]
    });
  });
  renderPlayers();
}

function toggleDrop(id){
  const p = state.players.find(p=>p.id===id);
  if(p){ p.dropped = !p.dropped; renderPlayers(); }
}

function removePlayer(id){
  if(state.started) return;
  state.players = state.players.filter(p=>p.id!==id);
  renderPlayers();
}

function renderPlayers(){
  const active = state.players.filter(p=>!p.dropped);
  const ro = document.getElementById('inp-rounds').value;
  const rounds = ro==='auto' ? calcRounds(active.length) : parseInt(ro);
  document.getElementById('player-count-info').textContent = state.players.length + '人登録済み';
  document.getElementById('rounds-preview').textContent = active.length>0 ? `→ ${rounds}ラウンド予定` : '';
  const list = document.getElementById('player-list');
  if(state.players.length===0){
    list.innerHTML='<div class="empty" style="padding:16px;">プレイヤーを追加してください</div>';
    return;
  }
  list.innerHTML = state.players.map(p=>`
    <div class="player-item">
      <span style="font-weight:500">${escapeHtml(p.name)}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="badge ${p.dropped?'badge-drop':'badge-active'}">${p.dropped?'DROP':'参加'}</span>
        ${state.started
          ? `<button class="btn btn-ghost btn-sm" onclick="toggleDrop('${p.id}')">${p.dropped?'復帰':'DROP'}</button>`
          : `<button class="btn btn-ghost btn-sm" onclick="removePlayer('${p.id}')">削除</button>`
        }
      </div>
    </div>
  `).join('');
}

async function startTournament(){
  const active = state.players.filter(p=>!p.dropped);
  if(active.length<2){ alert('参加者が2人以上必要です'); return; }
  const name = document.getElementById('inp-tournament-name').value.trim() || 'スイスドロー大会';
  const ro = document.getElementById('inp-rounds').value;
  const totalRounds = ro==='auto' ? calcRounds(active.length) : parseInt(ro);

  try {
    const { data: t, error: te } = await db.from('tournaments').insert({
      name, total_rounds: totalRounds, current_round: 0, started: true
    }).select().single();
    if(te) throw te;

    state.tournamentId = t.id;
    state.name = name;
    state.totalRounds = totalRounds;
    state.started = true;
    state.currentRound = 0;
    state.rounds = [];

    const playerRows = state.players.map(p=>({
      tournament_id: t.id, name: p.name, dropped: p.dropped
    }));
    const { data: savedPlayers, error: pe } = await db.from('players').insert(playerRows).select();
    if(pe) throw pe;

    state.players = savedPlayers.map(sp=>({
      id: sp.id, name: sp.name, dropped: sp.dropped,
      wins:0, losses:0, draws:0, gameWins:0, gameLosses:0, opponents:[]
    }));

    document.getElementById('tournament-name-display').textContent = name;
    alert(`大会ID: ${t.id}\n\nこのIDを参加者に共有してください。`);

    await nextRound();
    switchTab('round');
  } catch(e) {
    alert('大会の開始に失敗しました: ' + e.message);
  }
}

async function loadTournament(){
  const id = document.getElementById('inp-load-id').value.trim();
  if(!id){ alert('大会IDを入力してください'); return; }
  const status = document.getElementById('load-status');
  status.textContent = '読み込み中...';
  try {
    const { data: t, error: te } = await db.from('tournaments').select('*').eq('id', id).single();
    if(te) throw te;
    const { data: players, error: pe } = await db.from('players').select('*').eq('tournament_id', id);
    if(pe) throw pe;
    const { data: matches, error: me } = await db.from('matches').select('*').eq('tournament_id', id).order('round_num');
    if(me) throw me;

    state.tournamentId = t.id;
    state.name = t.name;
    state.totalRounds = t.total_rounds;
    state.currentRound = t.current_round;
    state.started = t.started;
    state.players = players.map(p=>({
      id: p.id, name: p.name, dropped: p.dropped,
      wins: p.wins, losses: p.losses, draws: p.draws,
      gameWins: p.game_wins, gameLosses: p.game_losses,
      opponents: p.opponents || []
    }));

    const roundNums = [...new Set(matches.map(m=>m.round_num))].sort((a,b)=>a-b);
    state.rounds = roundNums.map(rn=>{
      const rMatches = matches.filter(m=>m.round_num===rn).map(m=>({
        id: m.id, p1: m.p1_id, p2: m.p2_id || 'bye',
        result: m.result, gw1: m.gw1, gw2: m.gw2, submitted: m.submitted
      }));
      sortMatchesForTables(rMatches, state.players);
      return { matches: rMatches, submitted: rMatches.every(m=>m.submitted) };
    });

    document.getElementById('tournament-name-display').textContent = t.name;
    renderPlayers();
    status.textContent = `「${t.name}」を読み込みました`;
    switchTab('round');
  } catch(e) {
    status.textContent = '読み込みに失敗しました: ' + e.message;
  }
}

async function nextRound(){
  const active = state.players.filter(p=>!p.dropped);
  const sorted = [...active].sort((a,b)=>{
    const diff = getPoints(b)-getPoints(a);
    return diff !== 0 ? diff : Math.random()-.5;
  });
  const used = new Set();
  const matches = [];

  for(let i=0; i<sorted.length; i++){
    if(used.has(sorted[i].id)) continue;
    let paired = false;
    for(let j=i+1; j<sorted.length; j++){
      if(used.has(sorted[j].id)) continue;
      if(sorted[i].opponents.includes(sorted[j].id)) continue;
      matches.push({p1:sorted[i].id, p2:sorted[j].id, result:null, gw1:0, gw2:0});
      used.add(sorted[i].id); used.add(sorted[j].id);
      paired = true; break;
    }
    if(!paired && !used.has(sorted[i].id)){
      for(let j=i+1; j<sorted.length; j++){
        if(used.has(sorted[j].id)) continue;
        matches.push({p1:sorted[i].id, p2:sorted[j].id, result:null, gw1:0, gw2:0});
        used.add(sorted[i].id); used.add(sorted[j].id);
        paired = true; break;
      }
    }
    if(!paired && !used.has(sorted[i].id)){
      matches.push({p1:sorted[i].id, p2:'bye', result:'bye', gw1:2, gw2:0});
      used.add(sorted[i].id);
    }
  }

  state.currentRound++;

  try {
    const matchRows = matches.map(m=>({
      tournament_id: state.tournamentId,
      round_num: state.currentRound,
      p1_id: m.p1,
      p2_id: m.p2==='bye' ? null : m.p2,
      result: m.result,
      gw1: m.gw1, gw2: m.gw2,
      submitted: m.result==='bye'
    }));
    const { data: savedMatches, error } = await db.from('matches').insert(matchRows).select();
    if(error) throw error;

    const localMatches = savedMatches.map((sm,i)=>({
      id: sm.id,
      p1: matches[i].p1,
      p2: matches[i].p2,
      result: matches[i].result,
      gw1: matches[i].gw1,
      gw2: matches[i].gw2,
      submitted: matches[i].result==='bye'
    }));

    sortMatchesForTables(localMatches, state.players);
    state.rounds.push({matches: localMatches, submitted:false});
    await db.from('tournaments').update({current_round: state.currentRound}).eq('id', state.tournamentId);
  } catch(e) {
    sortMatchesForTables(matches, state.players);
    state.rounds.push({matches, submitted:false});
  }

  renderRound();
}

function renderRound(){
  const el = document.getElementById('round-content');
  if(!state.started){ el.innerHTML='<div class="empty">大会を開始してください</div>'; return; }
  const round = state.rounds[state.currentRound-1];
  sortMatchesForTables(round.matches, state.players);
  const isLast = state.currentRound >= state.totalRounds;
  const playerUrl = `${location.origin}${location.pathname}?tid=${state.tournamentId}&round=${state.currentRound}`;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(playerUrl)}`;

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">大会名</div><div class="stat-value" style="font-size:14px;">${escapeHtml(state.name)}</div></div>
      <div class="stat"><div class="stat-label">現在</div><div class="stat-value">R${state.currentRound}</div></div>
      <div class="stat"><div class="stat-label">全体</div><div class="stat-value">${state.totalRounds}R</div></div>
      <div class="stat"><div class="stat-label">参加者</div><div class="stat-value">${state.players.filter(p=>!p.dropped).length}人</div></div>
    </div>

    <div class="card">
      <div class="card-title">参加者用QRコード</div>
      <div class="qr-wrap">
        <img src="${qrUrl}" alt="QRコード">
        <div class="qr-url">${playerUrl}</div>
        <p style="font-size:12px;color:var(--text2);margin-top:8px;">参加者はこのQRを読み取って結果を送信できます</p>
      </div>
    </div>

    <div class="round-header">
      <div class="round-title">ラウンド ${state.currentRound} 対戦表</div>
      <button class="btn btn-ghost btn-sm" onclick="refreshResults()">結果を更新</button>
    </div>
    <div id="matches-list">
      ${round.matches.map((m,i)=>renderMatch(m,i)).join('')}
    </div>
    <div class="btn-group">
      <button class="btn btn-success" onclick="submitRound()">結果を確定する</button>
      ${round.submitted && !isLast ? `<button class="btn btn-primary" onclick="nextRound()">次のラウンドへ →</button>` : ''}
      ${round.submitted && isLast ? `<button class="btn btn-warn" onclick="switchTab('standing')">最終順位を見る</button>` : ''}
    </div>
  `;
}

function renderMatch(m, i){
  const tableNo = i + 1;
  if(m.p2==='bye'||m.result==='bye'){
    const p = getPlayer(m.p1);
    return `<div class="bye-card"><span class="table-no">第${tableNo}卓</span>${escapeHtml(p?p.name:'?')} — 不戦勝（BYE）</div>`;
  }
  const p1 = getPlayer(m.p1), p2 = getPlayer(m.p2);
  return `
    <div class="match-card">
      <div class="table-no">第${tableNo}卓</div>
      <div class="match-players">
        <div class="match-player">${escapeHtml(p1?p1.name:'?')}</div>
        <div class="match-vs">VS</div>
        <div class="match-player">${escapeHtml(p2?p2.name:'?')}</div>
      </div>
      <div class="match-result-row">
        <select id="res-${i}" onchange="updateResult(${i}, '${m.id}')">
          <option value="">-- 結果 --</option>
          <option value="p1" ${m.result==='p1'?'selected':''}>${escapeHtml(p1?p1.name:'?')} 勝利</option>
          <option value="p2" ${m.result==='p2'?'selected':''}>${escapeHtml(p2?p2.name:'?')} 勝利</option>
          <option value="draw" ${m.result==='draw'?'selected':''}>引き分け</option>
        </select>
        <span style="font-size:12px;color:var(--text2);">ゲーム数</span>
        <input type="number" id="gw1-${i}" value="${m.gw1||0}" min="0" max="2" style="width:52px;" onchange="updateGW(${i}, '${m.id}')">
        <span style="color:var(--text2);">-</span>
        <input type="number" id="gw2-${i}" value="${m.gw2||0}" min="0" max="2" style="width:52px;" onchange="updateGW(${i}, '${m.id}')">
      </div>
      ${m.submitted ? '<div class="match-submitted">送信済み</div>' : ''}
    </div>
  `;
}

async function updateResult(i, matchId){
  const round = state.rounds[state.currentRound-1];
  const result = document.getElementById('res-'+i).value || null;
  const gw1El = document.getElementById('gw1-'+i);
  const gw2El = document.getElementById('gw2-'+i);
  let gw1 = parseInt(gw1El.value, 10) || 0;
  let gw2 = parseInt(gw2El.value, 10) || 0;
  ({ gw1, gw2 } = applyResultAutoGame(result, gw1, gw2));
  gw1El.value = gw1;
  gw2El.value = gw2;
  round.matches[i].result = result;
  round.matches[i].gw1 = gw1;
  round.matches[i].gw2 = gw2;
  if(matchId && !matchId.startsWith('undefined')){
    await db.from('matches').update({result, gw1, gw2}).eq('id', matchId);
  }
}

async function updateGW(i, matchId){
  const round = state.rounds[state.currentRound-1];
  const gw1 = parseInt(document.getElementById('gw1-'+i).value)||0;
  const gw2 = parseInt(document.getElementById('gw2-'+i).value)||0;
  round.matches[i].gw1 = gw1;
  round.matches[i].gw2 = gw2;
  if(matchId && !matchId.startsWith('undefined')){
    await db.from('matches').update({gw1, gw2}).eq('id', matchId);
  }
}

async function refreshResults(){
  if(!state.tournamentId) return;
  try {
    const { data: matches, error } = await db.from('matches')
      .select('*')
      .eq('tournament_id', state.tournamentId)
      .eq('round_num', state.currentRound);
    if(error) throw error;

    const round = state.rounds[state.currentRound-1];
    matches.forEach(m=>{
      const local = round.matches.find(lm=>lm.id===m.id);
      if(local){
        local.result = m.result;
        local.gw1 = m.gw1;
        local.gw2 = m.gw2;
        local.submitted = m.submitted;
      }
    });
    renderRound();
  } catch(e) {
    console.error('結果の取得に失敗:', e);
  }
}

async function submitRound(){
  const round = state.rounds[state.currentRound-1];
  const unfinished = round.matches.filter(m=>(!m.result||m.result==='')&&m.p2!=='bye');
  if(unfinished.length>0){
    if(!confirm(`${unfinished.length}試合の結果が未入力です。このまま確定しますか？`)) return;
  }

  round.matches.forEach(m=>{
    if(m.p2==='bye'||m.result==='bye'){
      const p = getPlayer(m.p1);
      if(p){ p.wins++; p.gameWins+=2; }
      return;
    }
    const p1=getPlayer(m.p1), p2=getPlayer(m.p2);
    if(!p1||!p2) return;
    p1.opponents.push(m.p2); p2.opponents.push(m.p1);
    p1.gameWins+=m.gw1; p1.gameLosses+=m.gw2;
    p2.gameWins+=m.gw2; p2.gameLosses+=m.gw1;
    if(m.result==='p1'){ p1.wins++; p2.losses++; }
    else if(m.result==='p2'){ p2.wins++; p1.losses++; }
    else if(m.result==='draw'){ p1.draws++; p2.draws++; }
  });

  round.submitted = true;

  try {
    for(const p of state.players){
      await db.from('players').update({
        wins: p.wins, losses: p.losses, draws: p.draws,
        game_wins: p.gameWins, game_losses: p.gameLosses,
        opponents: p.opponents, dropped: p.dropped
      }).eq('id', p.id);
    }
    for(const m of round.matches){
      if(m.id) await db.from('matches').update({submitted:true}).eq('id', m.id);
    }
  } catch(e) {
    console.error('DB更新エラー:', e);
  }

  renderRound(); renderStanding();
}

function getPoints(p){ return p.wins*3 + p.draws; }
function getPlayer(id){ return state.players.find(p=>p.id===id); }

function sortMatchesForTables(matches, players){
  const playerMap = new Map(players.map(p => [p.id, p]));
  const p1Id = m => m.p1 || m.p1_id;
  const p2Id = m => m.p2 || m.p2_id;
  const score = id => {
    const p = playerMap.get(id);
    return p ? getPoints(p) : 0;
  };
  const name = id => playerMap.get(id)?.name || '';
  return matches.sort((a,b)=>{
    const ap = Math.max(score(p1Id(a)), score(p2Id(a)));
    const bp = Math.max(score(p1Id(b)), score(p2Id(b)));
    if(bp !== ap) return bp - ap;
    const an = [name(p1Id(a)), name(p2Id(a))].sort().join('|');
    const bn = [name(p1Id(b)), name(p2Id(b))].sort().join('|');
    return an.localeCompare(bn, 'ja');
  });
}

function calcOMW(p){
  if(p.opponents.length===0) return 1/3;
  const rates = p.opponents.map(oid=>{
    const op = getPlayer(oid);
    if(!op) return 1/3;
    const total = op.wins+op.losses+op.draws;
    return total===0 ? 1/3 : Math.max(op.wins/total, 1/3);
  });
  return rates.reduce((s,r)=>s+r,0)/rates.length;
}
function calcGW(p){
  const total = p.gameWins+p.gameLosses;
  return total===0 ? 1/3 : Math.max(p.gameWins/total, 1/3);
}
function calcOGW(p){
  if(p.opponents.length===0) return 1/3;
  const rates = p.opponents.map(oid=>{ const op=getPlayer(oid); return op?calcGW(op):1/3; });
  return rates.reduce((s,r)=>s+r,0)/rates.length;
}

function playerOpponents(p){ return p.opponents || []; }
function playerGameWins(p){ return p.gameWins ?? p.game_wins ?? 0; }
function playerGameLosses(p){ return p.gameLosses ?? p.game_losses ?? 0; }
function getPlayerFromList(players, id){ return players.find(p=>p.id===id); }
function calcOMWFor(p, players){
  const opponents = playerOpponents(p);
  if(opponents.length===0) return 1/3;
  const rates = opponents.map(oid=>{
    const op = getPlayerFromList(players, oid);
    if(!op) return 1/3;
    const total = (op.wins || 0) + (op.losses || 0) + (op.draws || 0);
    return total===0 ? 1/3 : Math.max((op.wins || 0)/total, 1/3);
  });
  return rates.reduce((s,r)=>s+r,0)/rates.length;
}
function calcGWFor(p){
  const total = playerGameWins(p) + playerGameLosses(p);
  return total===0 ? 1/3 : Math.max(playerGameWins(p)/total, 1/3);
}
function calcOGWFor(p, players){
  const opponents = playerOpponents(p);
  if(opponents.length===0) return 1/3;
  const rates = opponents.map(oid=>{ const op=getPlayerFromList(players, oid); return op?calcGWFor(op):1/3; });
  return rates.reduce((s,r)=>s+r,0)/rates.length;
}
function getSortedPlayersFrom(players){
  return [...players].sort((a,b)=>{
    const pd = getPoints(b)-getPoints(a);
    if(pd!==0) return pd;
    const omw = calcOMWFor(b, players)-calcOMWFor(a, players);
    if(Math.abs(omw)>0.0001) return omw;
    const gw = calcGWFor(b)-calcGWFor(a);
    if(Math.abs(gw)>0.0001) return gw;
    return calcOGWFor(b, players)-calcOGWFor(a, players);
  });
}
function getSortedPlayers(){
  return [...state.players].sort((a,b)=>{
    const pd = getPoints(b)-getPoints(a);
    if(pd!==0) return pd;
    const omw = calcOMW(b)-calcOMW(a);
    if(Math.abs(omw)>0.0001) return omw;
    const gw = calcGW(b)-calcGW(a);
    if(Math.abs(gw)>0.0001) return gw;
    return calcOGW(b)-calcOGW(a);
  });
}

function renderStanding(){
  const el = document.getElementById('standing-content');
  if(!state.started){ el.innerHTML='<div class="empty">大会を開始してください</div>'; return; }
  const players = getSortedPlayers();
  el.innerHTML = `
    <table>
      <thead>
        <tr><th>順位</th><th>名前</th><th>勝点</th><th>W-L-D</th><th>OMW%</th><th>GW%</th><th>OGW%</th><th>状態</th></tr>
      </thead>
      <tbody>
        ${players.map((p,i)=>`
          <tr class="${i===0?'rank-gold':i===1?'rank-silver':i===2?'rank-bronze':''}">
            <td>${i+1}</td><td>${escapeHtml(p.name)}</td><td>${getPoints(p)}</td>
            <td>${p.wins}-${p.losses}-${p.draws}</td>
            <td>${(calcOMW(p)*100).toFixed(1)}%</td>
            <td>${(calcGW(p)*100).toFixed(1)}%</td>
            <td>${(calcOGW(p)*100).toFixed(1)}%</td>
            <td><span class="badge ${p.dropped?'badge-drop':'badge-active'}">${p.dropped?'DROP':'参加'}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function exportCSV(){
  const players = getSortedPlayers();
  const headers = ['順位','名前','勝点','勝','負','分','OMW%','GW%','OGW%','状態'];
  const rows = players.map((p,i)=>[
    i+1, p.name, getPoints(p), p.wins, p.losses, p.draws,
    (calcOMW(p)*100).toFixed(1), (calcGW(p)*100).toFixed(1), (calcOGW(p)*100).toFixed(1),
    p.dropped?'DROP':'参加'
  ]);
  const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.name||'swissdraw'}_standings.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetAll(){
  if(!confirm('大会データをすべてリセットしますか？')) return;
  state = {tournamentId:null,name:'',players:[],rounds:[],currentRound:0,totalRounds:0,started:false};
  renderPlayers(); renderRound(); renderStanding();
  document.getElementById('inp-tournament-name').value='';
  document.getElementById('tournament-name-display').textContent='';
}

let timerSec=50*60, timerRunning=false, timerInterval=null;
function timerStart(){
  if(timerRunning) return;
  timerRunning=true;
  timerInterval=setInterval(()=>{ timerSec--; updateTimerDisplay(); if(timerSec<=0){clearInterval(timerInterval);timerRunning=false;} },1000);
}
function timerPause(){ clearInterval(timerInterval); timerRunning=false; }
function timerReset(){
  clearInterval(timerInterval); timerRunning=false;
  const custom=parseInt(document.getElementById('timer-custom').value);
  const preset=parseInt(document.getElementById('timer-preset').value);
  timerSec=(custom>0?custom:preset)*60;
  updateTimerDisplay();
}
function updateTimerDisplay(){
  const m=Math.floor(timerSec/60), s=timerSec%60;
  const el=document.getElementById('timer-display');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer-display'+(timerSec<=60?' danger':timerSec<=300?' warn':'');
}

async function initPlayerPage(){
  document.getElementById('admin-app').classList.add('hidden');
  document.getElementById('player-app').classList.remove('hidden');
  await checkConnection('player-conn-status');

  const tid = params.get('tid');
  const roundNum = parseInt(params.get('round'), 10);
  const content = document.getElementById('player-page-content');

  if(!tid || !roundNum){
    content.innerHTML = '<div class="empty">URLが正しくありません</div>';
    return;
  }

  try {
    const [{ data: tournament, error: te }, { data: players, error: pe }, { data: matches, error: me }] = await Promise.all([
      db.from('tournaments').select('*').eq('id', tid).single(),
      db.from('players').select('*').eq('tournament_id', tid).order('name'),
      db.from('matches').select('*').eq('tournament_id', tid).eq('round_num', roundNum)
    ]);
    if(te) throw te;
    if(pe) throw pe;
    if(me) throw me;

    playerPage.tournament = tournament;
    playerPage.players = players || [];
    playerPage.matches = matches || [];
    sortMatchesForTables(playerPage.matches, playerPage.players);
    const storedPlayerId = getStoredPlayerId();
    if(playerPage.players.some(p => p.id === storedPlayerId)){
      playerPage.selectedPlayerId = storedPlayerId;
      storeSelectedPlayer(storedPlayerId);
    }
    renderPlayerSelector();
    clearInterval(playerRoundPoll);
    playerRoundPoll = setInterval(refreshPlayerTournamentState, 15000);
  } catch(e) {
    content.innerHTML = `<div class="empty">大会情報を読み込めませんでした<br><span style="font-size:12px;">${escapeHtml(e.message)}</span></div>`;
  }
}

function renderPlayerSelector(){
  const roundNum = parseInt(params.get('round'), 10);
  const matchPlayerIds = new Set();
  playerPage.matches.forEach(m => {
    if(m.p1_id) matchPlayerIds.add(m.p1_id);
    if(m.p2_id) matchPlayerIds.add(m.p2_id);
  });
  const players = playerPage.players.filter(p => matchPlayerIds.has(p.id));
  const options = players.map(p => `<option value="${p.id}" ${p.id===playerPage.selectedPlayerId?'selected':''}>${escapeHtml(p.name)}</option>`).join('');

  document.getElementById('player-page-content').innerHTML = `
    <div class="player-summary">
      <div class="stat">
        <div class="stat-label">大会名</div>
        <div class="stat-value" style="font-size:16px;">${escapeHtml(playerPage.tournament.name)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">ラウンド</div>
        <div class="stat-value">R${roundNum}</div>
      </div>
    </div>
    <div id="next-round-area">${renderLatestRoundNotice(roundNum)}</div>
    <label class="field-label" for="player-select">あなたの名前</label>
    <select id="player-select" onchange="selectPlayerForSubmit(this.value)">
      <option value="">選択してください</option>
      ${options}
    </select>
    <div id="player-match-area" style="margin-top:14px;"></div>
    <div id="player-standing-area"></div>
  `;
  renderPlayerMatch();
  renderPlayerFinalStanding();
}

function renderLatestRoundNotice(roundNum){
  const latestRound = Number(playerPage.tournament?.current_round || 0);
  if(!latestRound || latestRound <= roundNum) return '';
  const url = getPlayerRoundUrl(latestRound);
  return `
    <a class="next-round-link" href="${url}">
      最新ラウンドへ進む（R${latestRound}）
    </a>
  `;
}

function updateLatestRoundNotice(){
  const area = document.getElementById('next-round-area');
  if(!area) return;
  area.innerHTML = renderLatestRoundNotice(parseInt(params.get('round'), 10));
}

async function refreshPlayerTournamentState(){
  if(!playerPage.tournament?.id) return;
  const roundNum = parseInt(params.get('round'), 10);
  const [{ data: tournament, error: te }, { data: players, error: pe }, { data: matches, error: me }] = await Promise.all([
    db.from('tournaments').select('id,name,total_rounds,current_round,started').eq('id', playerPage.tournament.id).single(),
    db.from('players').select('*').eq('tournament_id', playerPage.tournament.id).order('name'),
    db.from('matches').select('*').eq('tournament_id', playerPage.tournament.id).eq('round_num', roundNum)
  ]);
  if(te || pe || me) return;
  playerPage.tournament = tournament;
  playerPage.players = players || [];
  playerPage.matches = matches || [];
  sortMatchesForTables(playerPage.matches, playerPage.players);
  updateLatestRoundNotice();
  renderPlayerMatch();
  renderPlayerFinalStanding();
}

function selectPlayerForSubmit(playerId){
  playerPage.selectedPlayerId = playerId;
  storeSelectedPlayer(playerId);
  updateLatestRoundNotice();
  renderPlayerMatch();
}

function renderPlayerMatch(){
  const area = document.getElementById('player-match-area');
  if(!area) return;
  const playerId = playerPage.selectedPlayerId;
  if(!playerId){
    area.innerHTML = '<div class="empty" style="padding:20px;">名前を選択すると対戦が表示されます</div>';
    return;
  }

  const match = playerPage.matches.find(m => m.p1_id === playerId || m.p2_id === playerId);
  const tableNo = playerPage.matches.findIndex(m => m.p1_id === playerId || m.p2_id === playerId) + 1;
  const player = playerPage.players.find(p => p.id === playerId);
  if(!match){
    area.innerHTML = '<div class="empty" style="padding:20px;">このラウンドの対戦が見つかりません</div>';
    return;
  }
  if(!match.p2_id || match.result === 'bye'){
    area.innerHTML = `
      <div class="player-table-callout">あなたは第${tableNo}卓です</div>
      <div class="bye-card">${escapeHtml(player.name)} — 不戦勝（BYE）</div>
    `;
    return;
  }

  const p1 = playerPage.players.find(p => p.id === match.p1_id);
  const p2 = playerPage.players.find(p => p.id === match.p2_id);
  const myWinValue = playerId === match.p1_id ? 'p1' : 'p2';
  const oppWinValue = playerId === match.p1_id ? 'p2' : 'p1';
  const opponent = playerId === match.p1_id ? p2 : p1;
  const disabledAttr = match.submitted ? 'disabled' : '';
  const submitArea = match.submitted
    ? '<div class="submit-status waiting">結果を送信しました。運営で結果が登録されるまでお待ちください。</div>'
    : `<button class="btn btn-success submit-wide" id="player-submit-btn" onclick="submitPlayerResult('${match.id}')">結果を送信する</button>
       <div id="player-submit-status" class="submit-status"></div>`;

  area.innerHTML = `
    <div class="match-card player-submit-card">
      <div class="player-table-callout">あなたは第${tableNo}卓です</div>
      <div class="match-players">
        <div class="match-player">${escapeHtml(p1?p1.name:'?')}</div>
        <div class="match-vs">VS</div>
        <div class="match-player">${escapeHtml(p2?p2.name:'?')}</div>
      </div>

      <div class="player-opponent">対戦相手：${escapeHtml(opponent?opponent.name:'?')}</div>

      <label class="field-label" for="player-result">試合結果</label>
      <select id="player-result" onchange="autoFillPlayerGameCount()" ${disabledAttr}>
        <option value="">選択してください</option>
        <option value="${myWinValue}" ${match.result===myWinValue?'selected':''}>自分の勝ち</option>
        <option value="${oppWinValue}" ${match.result===oppWinValue?'selected':''}>相手の勝ち</option>
        <option value="draw" ${match.result==='draw'?'selected':''}>引き分け</option>
      </select>

      <div class="score-row">
        <div>
          <label class="field-label" for="player-gw1">${escapeHtml(p1?p1.name:'?')}</label>
          <input type="number" id="player-gw1" min="0" max="2" value="${match.gw1 || 0}" ${disabledAttr}>
        </div>
        <div class="score-separator">-</div>
        <div>
          <label class="field-label" for="player-gw2">${escapeHtml(p2?p2.name:'?')}</label>
          <input type="number" id="player-gw2" min="0" max="2" value="${match.gw2 || 0}" ${disabledAttr}>
        </div>
      </div>

      ${submitArea}
    </div>
  `;
}

function renderPlayerFinalStanding(){
  const area = document.getElementById('player-standing-area');
  if(!area) return;
  const roundNum = parseInt(params.get('round'), 10);
  const isFinalRound = roundNum >= Number(playerPage.tournament?.total_rounds || 0);
  const allSubmitted = playerPage.matches.length > 0 && playerPage.matches.every(m => m.submitted);
  if(!isFinalRound || !allSubmitted){
    area.innerHTML = '';
    return;
  }

  const players = getSortedPlayersFrom(playerPage.players);
  area.innerHTML = `
    <div class="card player-standings-card">
      <div class="card-title">最終成績</div>
      <table>
        <thead>
          <tr><th>順位</th><th>名前</th><th>勝点</th><th>W-L-D</th><th>OMW%</th><th>GW%</th><th>OGW%</th></tr>
        </thead>
        <tbody>
          ${players.map((p,i)=>`
            <tr class="${p.id===playerPage.selectedPlayerId?'my-standing-row':''}">
              <td>${i+1}</td>
              <td>${escapeHtml(p.name)}${p.id===playerPage.selectedPlayerId?' <span class="my-standing-badge">あなた</span>':''}</td>
              <td>${getPoints(p)}</td>
              <td>${p.wins || 0}-${p.losses || 0}-${p.draws || 0}</td>
              <td>${(calcOMWFor(p, playerPage.players)*100).toFixed(1)}%</td>
              <td>${(calcGWFor(p)*100).toFixed(1)}%</td>
              <td>${(calcOGWFor(p, playerPage.players)*100).toFixed(1)}%</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function autoFillPlayerGameCount(){
  const result = document.getElementById('player-result')?.value || null;
  const gw1El = document.getElementById('player-gw1');
  const gw2El = document.getElementById('player-gw2');
  if(!gw1El || !gw2El) return;
  let gw1 = parseInt(gw1El.value, 10) || 0;
  let gw2 = parseInt(gw2El.value, 10) || 0;
  ({ gw1, gw2 } = applyResultAutoGame(result, gw1, gw2));
  gw1El.value = gw1;
  gw2El.value = gw2;
}

async function submitPlayerResult(matchId){
  const result = document.getElementById('player-result').value;
  let gw1 = parseInt(document.getElementById('player-gw1').value, 10) || 0;
  let gw2 = parseInt(document.getElementById('player-gw2').value, 10) || 0;
  const status = document.getElementById('player-submit-status');
  const button = document.getElementById('player-submit-btn');

  if(!result){
    status.textContent = '試合結果を選択してください';
    status.className = 'submit-status error';
    return;
  }
  ({ gw1, gw2 } = applyResultAutoGame(result, gw1, gw2));
  document.getElementById('player-gw1').value = gw1;
  document.getElementById('player-gw2').value = gw2;
  if(Number.isNaN(gw1) || Number.isNaN(gw2) || gw1 < 0 || gw2 < 0 || gw1 > 2 || gw2 > 2){
    status.textContent = 'ゲーム数は0〜2で入力してください';
    status.className = 'submit-status error';
    return;
  }

  status.textContent = '送信中...';
  status.className = 'submit-status';
  if(button){
    button.disabled = true;
    button.textContent = '送信中...';
  }

  try {
    const { data, error } = await db.from('matches')
      .update({ result, gw1, gw2, submitted: true })
      .eq('id', matchId)
      .select()
      .single();
    if(error) throw error;

    const idx = playerPage.matches.findIndex(m => m.id === matchId);
    if(idx >= 0) playerPage.matches[idx] = data;
    await refreshPlayerTournamentState();
  } catch(e) {
    status.textContent = '送信に失敗しました: ' + e.message;
    status.className = 'submit-status error';
    if(button){
      button.disabled = false;
      button.textContent = '結果を送信する';
    }
  }
}

if(isPlayerPage){
  initPlayerPage();
}else{
  checkConnection();
  renderPlayers();
  updateTimerDisplay();
}
